<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CSCS — Payment</title>
<style>
:root{
  --bg:#f7f9fb; --card:#fff; --accent:#00c37a; --muted:#6b7280;
  --container-width:1100px;
}
body{margin:0;font-family:Inter,Arial,Helvetica,sans-serif;background:var(--bg);color:#0b1220;}
.wrap{max-width:var(--container-width);margin:28px auto;padding:18px;display:flex;gap:24px;align-items:flex-start}
.left, .right{background:var(--card);border-radius:10px;padding:26px;box-shadow:0 6px 20px rgba(11,18,32,0.06)}
.left{flex:0 0 46%;min-width:300px}
.right{flex:1;min-width:320px}
h3{margin:0 0 12px 0}
.currency-list{display:flex;gap:12px;margin:14px 0}
.currency-btn{flex:1;padding:12px;border-radius:8px;border:1px solid #e6eef8;background:#fcfeff;cursor:pointer;display:flex;align-items:center;gap:10px;justify-content:center}
.currency-btn.active{border-color:var(--accent);box-shadow:0 6px 18px rgba(0,195,122,0.06)}
.small{font-size:13px;color:var(--muted)}
.summary-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed #eef3f6}
.total{font-weight:700;font-size:18px}
.pay-area{display:flex;flex-direction:column;gap:12px;margin-top:18px}
.pay-btn{background:var(--accent);color:white;border:none;padding:12px;border-radius:8px;font-weight:700;cursor:pointer}
label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}
.input-field, .StripeElement{width:100%;padding:10px;border-radius:8px;border:1px solid #e6eef8;background:#fff;box-sizing:border-box}
.StripeElement{background:#fff}
.select-field{width:100%;padding:10px;border-radius:8px;border:1px solid #e6eef8;background:#fff}
.checkbox-row{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--muted);margin-top:8px}
@media(max-width:880px){.wrap{flex-direction:column;padding:12px}.left,.right{width:100%}}
</style>
</head>
<body>

<div class="wrap">
  <!-- LEFT: currency & summary -->
  <div class="left">
    <strong>CSCS Card</strong>

    <h3>Enter Amount:</h3>
    <input type="number" id="amountInput" class="input-field" placeholder="Enter amount in INR or GBP" value="7964.35" />

    <h3 style="margin-top:20px;">Choose a currency:</h3>
    <div class="currency-list">
      <button class="currency-btn active" data-currency="INR" id="btnINR">🇮🇳 INR</button>
      <button class="currency-btn" data-currency="GBP" id="btnGBP">🇬🇧 GBP</button>
    </div>
    <div class="small" id="rateInfo">1 GBP = 122.5285 INR</div>

    <div style="margin-top:28px">
      <div class="summary-row"><div>Order</div><div class="small">Amount</div></div>
      <div class="summary-row"><div>CSCS Test Booking - Ref: <strong>#855504</strong></div><div id="amountLeft">₹7,964.35</div></div>
      <div class="summary-row"><div class="small">Payment currency</div><div id="currencyLeft" class="small">INR</div></div>
      <div style="margin-top:18px" class="total-row">
        <div class="summary-row"><div class="total">Total</div><div id="totalLeft" class="total">₹7,964.35</div></div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Stripe payment -->
  <div class="right">
    <h3>Payment method</h3>

    <label>Card information</label>
    <div id="card-number" class="StripeElement"></div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <div style="flex:1">
        <label>MM / YY</label>
        <div id="card-expiry" class="StripeElement"></div>
      </div>
      <div style="flex:1">
        <label>CVC</label>
        <div id="card-cvc" class="StripeElement"></div>
      </div>
    </div>

    <label style="margin-top:12px;">Cardholder name</label>
    <input type="text" id="cardholderName" class="input-field" placeholder="Full name on card" />

    <label style="margin-top:12px;">Country or region</label>
    <select id="country" class="select-field">
      <option value="India" selected>India</option>
      <option value="United Kingdom">United Kingdom</option>
      <option value="United States">United States</option>
    </select>

    <div class="checkbox-row">
      <input type="checkbox" id="saveInfo" />
      <label for="saveInfo">Save my information for faster checkout<br><span style="font-size:12px;">Pay faster on Construction Card and anywhere Link is accepted.</span></label>
    </div>

    <div id="card-errors" style="color:red;font-size:13px;margin-top:4px;"></div>

    <div class="pay-area">
      <button id="payBtn" class="pay-btn">Pay</button>
    </div>
</div>
<style>
section {
  font-family: Arial, sans-serif;
  background: #f7f9fb;
  display: flex;
  justify-content: center;
text-align: center;
  align-items: center;
  height: 10vh;
}
.container {
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  width: 350px;
}
h2 {
  text-align: center;
  color: #333;
}
</style>
</head>
<body>

<div class="container">
  <h2>Pay with PayPal</h2>
  <p style="text-align:center;color:#555;">Amount: <strong>£65.00 GBP</strong></p>

  <!-- PayPal Button -->
  <div id="paypal-button-container"></div>
</div>

<!-- PayPal JS SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=sb&currency=GBP"></script>
<script>
paypal.Buttons({
    style: {
        layout: 'vertical',
        color:  'gold',
        shape:  'rect',
        label:  'paypal'
    },
    createOrder: function(data, actions) {
        return actions.order.create({
            purchase_units: [{
                amount: { value: '65.00' } // GBP me amount
            }]
        });
    },
    onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
            alert('Payment completed by ' + details.payer.name.given_name);
            // Redirect after payment
            window.location.href = "/success";
        });
    }
}).render('#paypal-button-container');
</script>

</div>

<!-- Stripe JS -->
<script src="https://js.stripe.com/v3/"></script>
<script>
  const stripe = Stripe("pk_test_XXXXXXXXXXXXXXXXXXXXXXXX");
  const elements = stripe.elements();

  const style = { base: { fontSize: '16px', color: '#0b1220' } };
  const cardNumber = elements.create('cardNumber', { style });
  cardNumber.mount('#card-number');

  const cardExpiry = elements.create('cardExpiry', { style });
  cardExpiry.mount('#card-expiry');

  const cardCvc = elements.create('cardCvc', { style });
  cardCvc.mount('#card-cvc');

  cardNumber.on('change', e => document.getElementById('card-errors').textContent = e.error ? e.error.message : '');
  cardExpiry.on('change', e => document.getElementById('card-errors').textContent = e.error ? e.error.message : '');
  cardCvc.on('change', e => document.getElementById('card-errors').textContent = e.error ? e.error.message : '');

  let exchangeRate = 122.5285;
  let selectedCurrency = "INR";
  const amountInput = document.getElementById('amountInput');
  const amountLeft = document.getElementById('amountLeft');
  const currencyLeft = document.getElementById('currencyLeft');
  const totalLeft = document.getElementById('totalLeft');

  function formatCurrency(value, curr) {
    return curr === "INR" ? "₹" + value.toLocaleString("en-IN",{minimumFractionDigits:2}) : "£" + value.toLocaleString("en-GB",{minimumFractionDigits:2});
  }
  function updateDisplay(){
    let amt = parseFloat(amountInput.value) || 0;
    amountLeft.textContent = formatCurrency(amt, selectedCurrency);
    currencyLeft.textContent = selectedCurrency;
    totalLeft.textContent = formatCurrency(amt, selectedCurrency);
  }
  function convertOnInput(){
    let amt = parseFloat(amountInput.value) || 0;
    if(selectedCurrency === "INR"){
      let gbp = amt / exchangeRate;
      document.getElementById('btnGBP').innerText = "🇬🇧 GBP (" + formatCurrency(gbp, "GBP") + ")";
    } else {
      let inr = amt * exchangeRate;
      document.getElementById('btnINR').innerText = "🇮🇳 INR (" + formatCurrency(inr, "INR") + ")";
    }
    updateDisplay();
  }
  function setCurrency(curr){
    selectedCurrency = curr;
    document.querySelectorAll('.currency-btn').forEach(b => b.classList.toggle('active', b.dataset.currency === curr));
    convertOnInput();
  }
  document.querySelectorAll('.currency-btn').forEach(btn => btn.addEventListener('click', () => setCurrency(btn.dataset.currency)));
  amountInput.addEventListener('input', convertOnInput);

  document.getElementById('payBtn').addEventListener('click', async () => {
    const name = document.getElementById('cardholderName').value;
    const email = prompt("Enter your email:"); // or use a real input
    const amount = Math.round(parseFloat(amountInput.value) * 100);

    const res = await fetch("/create-payment-intent", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ amount, currency: selectedCurrency, email })
    });
    const { clientSecret } = await res.json();

    const { paymentIntent, error } = await stripe.confirmCardPayment(clientSecret, {
      payment_method: {
        card: cardNumber,
        billing_details: { name, email }
      }
    });

    if (error) {
      alert(error.message);
    } else if (paymentIntent.status === "succeeded") {
      alert("Payment successful!");
      window.location.href = "/success";
    }
  });

  setCurrency('INR');
  convertOnInput();
</script>

</body>
</html>
