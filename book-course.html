    <!-- JavaScript for course list, live summary, validation, and manual address lookup -->
    <script>
        (function() {
            // ---------- Course list (from your request) ----------
            const courseList = [
"access-flooring-level-2-nvq",
"acoustic-floor-installation-level-2-nvq",
"associated-industrial-services-occupations-passive-fire-protection-level-2-nvq",

"construction-and-civil-engineering-operations-drainage-construction-level-2-nvq",
"construction-and-civil-engineering-operations-excavation-and-reinstatement-level-2-nvq",
"construction-and-civil-engineering-operations-excavation-level-2-nvq",
"construction-and-civil-engineering-operations-general-construction-level-2-nvq",
"construction-and-civil-engineering-operations-laying-kerbs-and-channels-level-2-nvq",
"construction-and-civil-engineering-operations-module-pavement-construction-level-2-nvq",
"construction-and-civil-engineering-operations-reinstatement-level-2-nvq",
"cranes-specialist-lifting-level-2-nvq",
"demolition-level-2-nvq",
"dry-lining-boarder-level-2-nvq",
"dry-lining-finishing-level-2-nvq",
"dry-lining-fixing-level-2-nvq",
"excavating-180-excavator-level-2-nvq",
"external-stone-fixing-level-2-nvq",
"fitted-interiors-level-2-nvq",
"forklift-trucks-level-2-nvq",
"formwork-carpenter-level-2-nvq",
"formwork-erector-striker-level-2-nvq",
"glass-partition-systems-level-2-nvq",
"industrial-painter-level-2-nvq",
"in-situ-flooring-concrete-layer-level-2-nvq",
"interior-systems-level-2-nvq",
"internal-stone-fixing-level-2-nvq",
"laying-distributing-dozer-level-2-nvq",
"licensed-asbestos-removal-level-2-nvq",
"loading-securing-level-2-nvq",
"movement-guide-level-2-nvq",
"operations-guide-level-2-nvq",
"painter-level-2-nvq",
"processing-plant-operations-level-2-nvq",
"removal-non-hazardous-waste-level-2-nvq",
"road-rail-operations-level-2-nvq",
"site-logistics-level-2-nvq",
"slinger-signaller-level-2-nvq",
"solid-plastering-level-2-nvq",
"stone-cladding-level-2-nvq",
"stonemasonry-stone-cutting-level-2-nvq",
"structural-concreting-level-2-nvq",
"temporary-traffic-management-urban-and-rural-roads-level-2-nvq",
"transporting-loads-level-2-nvq",
"trowel-occupations-level-2-nvq",
"wall-and-floor-tiling-level-2-nvq",
"wood-occupations-site-carpentry-level-2-nvq",
"wood-occupations-timber-decks-and-cladding-level-2-nvq",
"wood-occupations-timber-frame-erection-level-2-nvq",
"work-platforms-mewps-level-2-nvq"
            ];
            // Helper to convert hyphenated string to Title Case (e.g. "cladding-occupations-level-2-nvq" -> "Cladding Occupations Level 2 NVQ")
            function formatCourseName(str) {
                return str
                    .split('-')
                    .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                    .join(' ')
                    .replace(/Nvq$/, 'NVQ'); // fix last word
            }

            // Populate the select dropdown
            const selectEl = document.getElementById('selected_nvq');
            courseList.forEach(courseValue => {
                const option = document.createElement('option');
                option.value = courseValue;
                option.textContent = formatCourseName(courseValue);
                selectEl.appendChild(option);
            });

            // ---------- Manual UK Address Lookup (fallback using GetAddress.io) ----------
            const findBtn = document.getElementById('findAddressBtn');
            const lookupPostcode = document.getElementById('lookup_postcode');
            const addrLine1 = document.getElementById('address_line_1');
            const cityField = document.getElementById('city');
            const postcodeField = document.getElementById('postcode');

            // Replace with your actual GetAddress.io API key (free tier available)
            const GETADDRESS_API_KEY = 'key=gm26-ce18-kr99-hj91';  // <-- GET YOUR FREE KEY FROM https://getaddress.io

            findBtn.addEventListener('click', function() {
                const pc = lookupPostcode.value.trim().replace(/\s/g, '');
                if (!pc) {
                    alert('Please enter a postcode.');
                    return;
                }

                // Disable button while fetching
                findBtn.disabled = true;
                findBtn.textContent = 'Searching...';

                // Call GetAddress.io (free tier: 20 requests/day)
                fetch(`https://api.getaddress.io/find/${pc}?api-key=gm26-ce18-kr99-hj91`)
                    .then(response => {
                        if (!response.ok) {
                            if (response.status === 401) throw new Error('Invalid API key or no key provided');
                            if (response.status === 404) throw new Error('Postcode not found');
                            throw new Error('Address lookup failed');
                        }
                        return response.json();
                    })
                    .then(data => {
                        // The API returns an array of addresses. We'll take the first one.
                        if (data.addresses && data.addresses.length > 0) {
                            const first = data.addresses[0];
                            // Format: typically "Flat 1, 12 High Street" etc.
                            addrLine1.value = first.address;    // full street address
                            cityField.value = first.town || first.city || ''; 
                            postcodeField.value = pc.toUpperCase();
                            // Optionally clear line 2
                            document.getElementById('address_line_2').value = '';
                            // Trigger live summary update
                            updateSummary();
                        } else {
                            alert('No addresses found for this postcode.');
                        }
                    })
                    .catch(error => {
                        console.error(error);
                        alert('Address lookup failed. Please check the postcode or try manual entry.');
                    })
                    .finally(() => {
                        findBtn.disabled = false;
                        findBtn.textContent = 'Find Address';
                    });
            });

            // ---------- Form fields for live summary and validation ----------
            const form = document.getElementById('nvqForm');
            const fields = {
                first_name: document.getElementById('first_name'),
                last_name: document.getElementById('last_name'),
                email: document.getElementById('email'),
                confirm_email: document.getElementById('confirm_email'),
                phone: document.getElementById('phone'),
                address_line_1: document.getElementById('address_line_1'),
                city: document.getElementById('city'),
                postcode: document.getElementById('postcode'),
                citb_test: document.querySelectorAll('input[name="citb_test_completed"]'),
                selected_nvq: document.getElementById('selected_nvq')
            };
            const summaryBox = document.getElementById('liveSummary');

            // Email match validation
            function validateEmails() {
                if (fields.email.value && fields.confirm_email.value && fields.email.value !== fields.confirm_email.value) {
                    fields.email.style.borderColor = '#dc3545';
                    fields.confirm_email.style.borderColor = '#dc3545';
                    return false;
                } else {
                    fields.email.style.borderColor = '';
                    fields.confirm_email.style.borderColor = '';
                    return true;
                }
            }

            // Simple UK postcode hint (not exhaustive)
            function validatePostcode() {
                const pc = fields.postcode.value.trim();
                if (pc && !/^[A-Z]{1,2}[0-9][A-Z0-9]? ?[0-9][A-Z]{2}$/i.test(pc)) {
                    fields.postcode.style.borderColor = '#dc3545';
                    return false;
                } else {
                    fields.postcode.style.borderColor = '';
                    return true;
                }
            }

            // Update summary box
            function updateSummary() {
                let citb = '';
                fields.citb_test.forEach(r => { if (r.checked) citb = r.value; });
                let courseText = fields.selected_nvq.value 
                    ? formatCourseName(fields.selected_nvq.value) 
                    : '—';
                const html = `
                    <p><strong>Name:</strong> ${fields.first_name.value || '—'} ${fields.last_name.value || '—'}</p>
                    <p><strong>Email:</strong> ${fields.email.value || '—'}</p>
                    <p><strong>Phone:</strong> ${fields.phone.value || '—'}</p>
                    <p><strong>Address:</strong> ${fields.address_line_1.value || '—'}, ${fields.city.value || '—'} ${fields.postcode.value || '—'}</p>
                    <p><strong>CITB Test within 2 years:</strong> ${citb || '—'}</p>
                    <p><strong>Selected NVQ:</strong> ${courseText}</p>
                `;
                summaryBox.innerHTML = html;
            }

            // Attach listeners
            const inputs = form.querySelectorAll('input, select');
            inputs.forEach(el => el.addEventListener('input', function() {
                validateEmails();
                validatePostcode();
                updateSummary();
            }));
            // Also update on radio change
            fields.citb_test.forEach(r => r.addEventListener('change', updateSummary));

            // Manual address link
            document.getElementById('manualAddressTrigger').addEventListener('click', function(e) {
                e.preventDefault();
                addrLine1.value = '';
                document.getElementById('address_line_2').value = '';
                cityField.value = '';
                postcodeField.value = '';
                lookupPostcode.value = '';
                addrLine1.focus();
                updateSummary();
            });

            // Final validation before submit
            form.addEventListener('submit', function(e) {
                let isValid = true;
                const required = form.querySelectorAll('[required]');
                required.forEach(field => {
                    if (!field.value.trim()) {
                        field.style.borderColor = '#dc3545';
                        isValid = false;
                    } else {
                        field.style.borderColor = '';
                    }
                });
                if (!validateEmails()) isValid = false;
                if (!validatePostcode()) isValid = false;
                const terms = document.querySelector('input[name="accept_terms"]');
                if (!terms || !terms.checked) {
                    alert('You must accept the Terms and Conditions.');
                    isValid = false;
                }
                if (!isValid) {
                    e.preventDefault();
                    alert('Please fill in all required fields correctly.');
                } else {
                    // Optionally disable button to prevent double submission
                    document.getElementById('submitBtn').disabled = true;
                    document.getElementById('submitBtn').textContent = 'Submitting...';
                }
            });

            // Initial summary
            updateSummary();
        })();
    </script>
